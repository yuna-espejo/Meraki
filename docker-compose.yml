services:
    postgres:
        container_name: postgres_db
        image: postgres:16
        restart: always
        ports:
          -  "5432:5432"
        environment:
          POSTGRES_USER: ${DB_USER}
          POSTGRES_PASSWORD: ${DB_PWD}
          POSTGRES_DB: ${DB_NAME}
        volumes:
          - ./data:/var/lib/postgresql/data